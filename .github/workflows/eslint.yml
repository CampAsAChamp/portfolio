# ESLint Code Scanning — uses the same yarn + eslint.config.js as local `yarn lint:eslint`.
# Lint failures still upload SARIF, then fail the job so the check matches local behavior.
# More details at https://github.com/eslint/eslint and https://eslint.org

name: ESLint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "28 10 * * 2"

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # required for github/codeql-action/upload-sarif Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          yarn lint:eslint \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('eslint-results.sarif') != ''
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true

      - name: Fail if ESLint reported issues
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "ESLint failed — same rules as local \`yarn lint:eslint\` / lint-staged."
          exit 1
