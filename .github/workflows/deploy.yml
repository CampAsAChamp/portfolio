name: Deploy

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      deployments: write
      contents: read

    steps:
      - name: Start deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              description: 'Deploy to Cloudflare Pages'
            });

            return deployment.data.id;

      - name: Verify Cloudflare Pages deployment
        id: verify
        run: |
          echo "⏳ Polling https://nickhs.dev until it responds successfully..."
          ATTEMPTS=24
          DELAY=10
          for i in $(seq 1 "$ATTEMPTS"); do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "https://nickhs.dev/" || echo "000")
            echo "Attempt $i/$ATTEMPTS — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production site is reachable"
              echo "deploy_ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep "$DELAY"
          done
          echo "❌ Production site did not return HTTP 200 within $((ATTEMPTS * DELAY))s"
          echo "deploy_ok=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ steps.verify.outcome }}' === 'success';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: ok ? 'success' : 'failure',
              environment_url: 'https://nickhs.dev',
              description: ok
                ? 'Production site verified reachable'
                : 'Production site verification failed',
              auto_inactive: true
            });

      - name: Create deployment summary
        if: success()
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your site has been deployed to production!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌍 Live Site" >> $GITHUB_STEP_SUMMARY
          echo "**[https://nickhs.dev](https://nickhs.dev)** ✨" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID**: \`${{ steps.deployment.outputs.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Verification**: HTTP 200 from https://nickhs.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "💡 View deployment history in the [Environments](https://github.com/${{ github.repository }}/deployments) tab" >> $GITHUB_STEP_SUMMARY
