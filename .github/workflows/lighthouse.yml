name: Lighthouse Audits

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

jobs:
  lighthouse-desktop:
    name: Desktop Performance Audits
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production site
        run: yarn build

      - name: Start and warm up preview server
        run: |
          yarn preview &
          echo $! > preview.pid
          npx wait-on http://localhost:4173 --timeout 30000
          # Burn the JIT/OS-cache warm-up cost (confirmed via bootup-time: identical
          # bundle's `scripting` cost run ~2.5x slower on a process's first execution)
          # on a throwaway run nobody scores. Must use the same `lighthouse` binary
          # and Chrome-discovery path lighthouse-ci-action uses below -- an earlier
          # attempt warmed a separately-installed Playwright Chromium instead, which
          # is a different process/binary than what chrome-launcher finds here, and
          # had no effect (confirmed: cold run stayed ~2000ms scripting either way).
          npx lighthouse http://localhost:4173 --output=json --output-path=/dev/null \
            --chrome-flags="--headless" --quiet || true

      - name: Run Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@v12
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          urls: |
            http://localhost:4173
          configPath: "./.lighthouserc.desktop.ci.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Print Lighthouse scores summary
        if: always()
        run: node scripts/print-lighthouse-scores.mjs

      - name: Stop preview server
        if: always()
        run: kill "$(cat preview.pid)" 2>/dev/null || true

  lighthouse-mobile:
    name: Mobile Performance Audits
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production site
        run: yarn build

      - name: Start and warm up preview server
        run: |
          yarn preview &
          echo $! > preview.pid
          npx wait-on http://localhost:4173 --timeout 30000
          # Burn the JIT/OS-cache warm-up cost (confirmed via bootup-time: identical
          # bundle's `scripting` cost run ~2.5x slower on a process's first execution)
          # on a throwaway run nobody scores. Must use the same `lighthouse` binary
          # and Chrome-discovery path lighthouse-ci-action uses below -- an earlier
          # attempt warmed a separately-installed Playwright Chromium instead, which
          # is a different process/binary than what chrome-launcher finds here, and
          # had no effect (confirmed: cold run stayed ~2000ms scripting either way).
          npx lighthouse http://localhost:4173 --output=json --output-path=/dev/null \
            --chrome-flags="--headless" --quiet || true

      - name: Run Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@v12
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
