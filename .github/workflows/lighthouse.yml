name: Lighthouse Audits

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

jobs:
  lighthouse-desktop:
    name: Desktop Performance Audits
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production site
        run: yarn build

      - name: Install Playwright Chromium (for warm-up)
        run: npx playwright install --with-deps chromium

      - name: Start and warm up preview server
        run: |
          yarn preview &
          echo $! > preview.pid
          npx wait-on http://localhost:4173 --timeout 30000
          node scripts/warm-up-preview-server.mjs http://localhost:4173

      - name: Run Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@v12
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          urls: |
            http://localhost:4173
          configPath: "./.lighthouserc.desktop.ci.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Print Lighthouse scores summary
        if: always()
        run: node scripts/print-lighthouse-scores.mjs

      - name: Stop preview server
        if: always()
        run: kill "$(cat preview.pid)" 2>/dev/null || true

  lighthouse-mobile:
    name: Mobile Performance Audits
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production site
        run: yarn build

      - name: Install Playwright Chromium (for warm-up)
        run: npx playwright install --with-deps chromium

      - name: Start and warm up preview server
        run: |
          yarn preview &
          echo $! > preview.pid
          npx wait-on http://localhost:4173 --timeout 30000
          node scripts/warm-up-preview-server.mjs http://localhost:4173

      - name: Run Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@v12
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        with:
          urls: |
            http://localhost:4173
          configPath: "./.lighthouserc.mobile.ci.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Print Lighthouse scores summary
        if: always()
        run: node scripts/print-lighthouse-scores.mjs

      - name: Stop preview server
        if: always()
        run: kill "$(cat preview.pid)" 2>/dev/null || true
